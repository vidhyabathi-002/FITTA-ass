<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance - SBI Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h2 class="navbar-brand">SBI Bank</h2>
            <ul class="navbar-menu">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/logout" class="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="balance-container">
            <h1>Account Balance</h1>
            
            <div class="balance-card large">
                <h3>Your Current Balance</h3>
                <div class="balance-amount">Rs. {{ balance }}</div>
                <p class="timestamp">As of now</p>
            </div>

            <div class="action-buttons">
                <a href="/deposit" class="btn btn-success">Deposit</a>
                <a href="/withdraw" class="btn btn-warning">Withdraw</a>
                <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
