<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - SBI Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h2 class="navbar-brand">SBI Bank</h2>
            <ul class="navbar-menu">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/logout" class="logout-btn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h1>Deposit Money</h1>
            
            {% if message %}
                <div class="alert alert-success">{{ message }}</div>
            {% endif %}

            <form method="POST" action="/deposit">
                <div class="form-group">
                    <label for="amount">Deposit Amount (Rs.):</label>
                    <input type="number" id="amount" name="amount" 
                           placeholder="Enter amount" min="1" required>
                </div>

                <button type="submit" class="btn btn-success">Deposit</button>
                <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
            </form>

            <div class="info-box">
                <h4>Information:</h4>
                <ul>
                    <li>Minimum deposit: Rs. 1</li>
                    <li>Maximum deposit: Unlimited</li>
                    <li>Deposit is instantly credited to your account</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
